name: Build and deploy

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    name: Build and publish image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image-name.outputs.image }}
      sha-tag: ${{ steps.image-name.outputs.sha-tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Define lower-case image name
        id: image-name
        shell: bash
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "sha-tag=${IMAGE}:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push commit and latest tags
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image-name.outputs.sha-tag }}
            ${{ steps.image-name.outputs.image }}:latest

  deploy-staging:
    name: Deploy to staging
    needs: build-image
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Show image selected for staging
        run: echo "Staging image is ${{ needs.build-image.outputs.sha-tag }}"
      - name: Staging deployment placeholder
        run: |
          echo "DEPLOYMENT PLACEHOLDER: no hosting server is configured."
          echo "Would deploy ${{ needs.build-image.outputs.sha-tag }} to staging."
          # A real command could SSH to a server to run docker pull and
          # docker compose up, call a cloud deployment CLI, or update the
          # image of a Kubernetes Deployment.

  staging-smoke-test:
    name: Staging smoke test
    needs: [build-image, deploy-staging]
    runs-on: ubuntu-latest
    steps:
      # With no staging URL, running the published image here simulates
      # post-deployment validation of exactly what staging would run.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Start published image
        run: |
          docker run --detach --name materials-calculator-staging \
            --publish 8501:8501 \
            "${{ needs.build-image.outputs.sha-tag }}"
      - name: Wait for Streamlit health endpoint
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:8501/_stcore/health > /dev/null; then
              exit 0
            fi
            echo "Waiting for Streamlit (attempt ${attempt}/30)..."
            sleep 2
          done
          docker logs materials-calculator-staging
          exit 1
      - name: Verify application response
        run: curl --fail --show-error http://localhost:8501/
      - name: Stop test container
        if: always()
        run: docker rm --force materials-calculator-staging

  deploy-production:
    name: Deploy to production
    needs: [build-image, staging-smoke-test]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Show tested image selected for production
        run: echo "Promoting exact tested image ${{ needs.build-image.outputs.sha-tag }}"
      - name: Production deployment placeholder
        run: |
          echo "DEPLOYMENT PLACEHOLDER: no production server is configured."
          echo "Would deploy ${{ needs.build-image.outputs.sha-tag }} to production."
          # Replace this step with the real deployment command. Keep using the
          # commit-specific tag above so production receives the tested image.
